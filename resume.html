<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ajith Kuppam - Resume</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    :root {
      --bg: #0a0a1a;
      --surface: #12122a;
      --accent: #00ffff;
      --accent2: #9d00ff;
      --border: rgba(0, 255, 255, 0.15);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg);
      color: #e0e0e0;
      line-height: 1.6;
      padding: 2rem 1rem;
    }

    .resume {
      max-width: 960px;
      margin: 0 auto;
      background: var(--surface);
      border-radius: 16px;
      box-shadow: 0 0 40px rgba(0, 255, 255, 0.08);
      overflow: hidden;
    }

    .print-bar {
      display: flex;
      padding: 1rem 2rem;
      border-bottom: 1px solid var(--border);
    }

    .print-btn {
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      padding: 0.45rem 1rem;
      border-radius: 6px;
      cursor: pointer;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.82rem;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .print-btn:hover { background: var(--accent); color: #000; }
    .print-btn.active { background: var(--accent); color: #000; }

    .resume-embed {
      height: calc(100vh - 140px);
      min-height: 600px;
    }

    .resume-embed iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    @media print {
      @page { margin: 0; }
      body { background: #fff; padding: 0; }
      .resume { max-width: 100%; box-shadow: none; border-radius: 0; background: #fff; }
      .print-bar { display: none; }
      .resume-embed { height: auto; min-height: auto; }
      .resume-embed iframe { height: 100vh; }
    }

    @media (max-width: 600px) {
      body { padding: 0.5rem; }
      .print-bar { padding: 0.75rem 1rem; }
      .print-btn { font-size: 0.75rem; padding: 0.35rem 0.7rem; }
      .resume-embed { height: calc(100vh - 100px); min-height: 400px; }
    }
  </style>
</head>
<body>
  <div class="resume">
    <div class="print-bar">
      <div style="display:flex;gap:0.5rem;flex-wrap:wrap;width:100%;justify-content:space-between;align-items:center">
        <div style="display:flex;gap:0.4rem;flex-wrap:wrap">
          <button class="print-btn resume-type" data-type="master"><i class="fas fa-star"></i> Master</button>
          <button class="print-btn resume-type" data-type="game"><i class="fas fa-gamepad"></i> Game Dev</button>
          <button class="print-btn resume-type active" data-type="aids"><i class="fas fa-graduation-cap"></i> AIDS</button>
        </div>
        <button class="print-btn" id="printBtn"><i class="fas fa-print"></i> Print / Save PDF</button>
      </div>
    </div>
    <div class="resume-embed">
      <iframe id="resumeFrame" src="Resume/AIDS.pdf"></iframe>
    </div>
  </div>
  <script>
    const typeBtns = document.querySelectorAll('.resume-type');
    const frame = document.getElementById('resumeFrame');
    const printBtn = document.getElementById('printBtn');
    const files = {
      master: 'Resume/Master_Resume.pdf',
      game: 'Resume/Game_Resume.pdf',
      aids: 'Resume/AIDS.pdf'
    };
    typeBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        typeBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        frame.src = files[btn.dataset.type];
      });
    });
    printBtn.addEventListener('click', () => {
      frame.contentWindow.print();
    });
  </script>
</body>
</html>
